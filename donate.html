<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pieces for Paws</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>

    <link rel="icon" type="image/png" href="Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="Favicon/favicon.svg" />
<link rel="shortcut icon" href="Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="Favicon/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Pieces4Paws" />
<link rel="manifest" href="Favicon/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Corben:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="hamburger" onclick="toggleNav()">
            <hr><hr><hr>
        </div>
        <a href="index.html"><img src="Images/logo.png" alt="Pieces for Paws. Pieces for Paws logo with blue watercolor paw print"></a>

        <nav class="toggle-nav">
            <a href="events.html">Events</a>
            <a href="adopt.html">Adopt</a>
            <a href="donate.html">Donate</a>
            <a href="gallery.html">Gallery</a>
            <a href="about-us.html">About Us</a>
        </nav>
    </header>

    <main>
        <form>
            <div class="container">
                <label for="amount">Amount</label>
                <input type="text" id="amount" name="amount" value="$0.00">

                <label for="first-name">Contact</label>
                <input type="text" id="first-name" name="first-name" value="First Name">

                <label for="last-name"></label>
                <input type="text" id="last-name" name="last-name" value="Last Name">

                <label for="email"></label>
                <input type="email" id="email" name="email" value="Email">

                <label for="phone"></label>
                <input type="tel" id="phone" name="phone" value="Phone">

                <label for="address"></label>
                <input type="text" id="address" name="address" value="Address">

                <label for="city"></label>
                <input type="text" id="city" name="city" value="City">

                <label for="state"></label>
                <input type="text" id="state" name="state" value="State">

                <label for="card-number">Payment Information</label>
                <input type="text" id="card-number" name="card-number" value="Card Number">

                <label for="expiration-date"></label>
                <input type="text" id="expiration-date" name="expiration-date" value="Expiration Date">

                <label for="security-code"></label>
                <input type="text" id="security-code" name="security-code" value="Security Code">
            </div>
            <div class="submit">
                <input type="submit" value="Donate Now">
            </div>

        </form>


    </main>


    <footer>
        <Hr>
        <section class="footer">
            <a href="index.html"><img src="Images/logo.png"></a>
            <a href="about-us.html">Contact</a>
        </section>
    </footer>
</body>
</html>
